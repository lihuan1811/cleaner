name: Build WinCleaner

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:  # 允许手动触发构建

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build Release x86
      run: msbuild WinCleaner.sln /p:Configuration=Release /p:Platform=x86 /p:UseOfMfc=Static

    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: WinCleaner-Release
        path: Release/*.exe
        if-no-files-found: warn
        retention-days: 30
